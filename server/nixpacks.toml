[variables]
NODE_ENV = "production"
NODE_OPTIONS = "--max-old-space-size=4096"
NPM_CONFIG_LEGACY_PEER_DEPS = "true"
NPM_CONFIG_FUND = "false"
NPM_CONFIG_AUDIT = "false"

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "npm install",
  "cd ../client && npm install"
]

[phases.build]
cmds = [
  "cd ../client && npm run build",
  "npx prisma generate && npm run build"
]

[start]
cmd = "npx prisma generate && npx prisma migrate deploy && NODE_ENV=production node dist/server.js"

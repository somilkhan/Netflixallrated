[variables]
NODE_ENV = "production"
NODE_OPTIONS = "--max-old-space-size=4096"
NPM_CONFIG_LEGACY_PEER_DEPS = "true"
NPM_CONFIG_FUND = "false"
NPM_CONFIG_AUDIT = "false"

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "npm install",
  "cd ../client && npm install"
]

[phases.build]
cmds = [
  "cd ../client && npm run build && rm -rf node_modules"
]

[start]
cmd = "NODE_ENV=production tsx server/server.ts"
